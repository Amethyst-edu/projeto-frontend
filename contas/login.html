<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login GameCurio</title>
    <link rel="stylesheet" href="account.css">
    <link rel="icon" href="../gamecuriolupa.webp" type="image/x-icon">
</head>
<body class="a">

    <main class="container">
        <header class="welcomeback">
            <h2>Bem-vindo(a) de volta!</h2>
            <p>Faça login para acessar sua conta!</p>
        </header>
        
        
        <form method="POST" class="form">
            <p>E-mail ou Nome de Usuário</p>
            <input type="text" name="username" required>

            <p>Senha</p>
            <input type="password" name="password" required>

            <button type="submit">Entrar</button>
        </form>

        <footer class="extra-links">
            <p>Não tem uma conta? <a href="cadastro.html" class="link">Cadastre-se</a></p>
        </footer>
    </main>

</body>
</html>
