<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro GameCurio</title>
    <link rel="stylesheet" href="account.css">
    <link rel="icon" href="../gamecuriolupa.webp" type="image/x-icon">
</head>
<body class="b">
    <main class="container" style="border: #71e 2px solid;">
        <header class="welcomeback">
            <h2>Crie sua conta</h2>
            <p>Insira as informações para criar uma nova conta!</p>
        </header>

        <form method="POST" class="form">
            <p>Nome de Usuário</p>
            <input type="text" name="username" required>

            <p>E-mail</p>
            <input type="email" name="email" required>

            <p>Senha</p>
            <input type="password" name="password" required>

            <p>Confirmar Senha</p>
            <input type="password" name="confirm_password" required>

            <button type="submit" style="background-color: #21e;">Cadastrar</button>
        </form>

        <footer class="extra-links">
            <p>Já tem uma conta? <a href="login.html" class="link">Faça login</a></p>
        </footer>
    </main>
</body>
</html>
